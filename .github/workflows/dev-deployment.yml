name: Dev Deployment

on:
  push:
    branches: [ "dev" ]

jobs:
  build-and-push:
    runs-on: [self-hosted, dev-runner]
    steps:
      - name: Cleanup Workspace
        # Keeping sudo here because root-owned files may exist from previous runs
        run: |
          sudo rm -rf ${{ github.workspace }}/*
          sudo rm -rf ${{ github.workspace }}/.* || true

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: nirmal/react-app
          IMAGE_TAG: latest
        run: |
          # No manual 'docker login' needed. Action handles it for the current user.
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

  deploy-dev:
    needs: build-and-push
    runs-on: [self-hosted, dev-runner]
    steps:
      - name: Cleanup Workspace
        run: |
          sudo rm -rf ${{ github.workspace }}/*
          sudo rm -rf ${{ github.workspace }}/.* || true

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create .env.dev from GitHub Secrets
        # Fetches the secret content and creates the file for the runtime build
        run: |
          echo "${{ secrets.ENV_DEV }}" > .env.dev
          chmod 600 .env.dev

      - name: Deploy to Dev via Docker Compose
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: nirmal/react-app
          IMAGE_TAG: latest
        run: |
          # Stop host-level nginx if it's running
          sudo systemctl stop nginx || true

          # Deploy using Docker Compose without sudo
          # The container pulls the generic image and compiles React using the .env.dev above
          ECR_REGISTRY=${{ env.ECR_REGISTRY }} \
          ECR_REPOSITORY=${{ env.ECR_REPOSITORY }} \
          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          docker compose -f docker-compose.dev.yml up -d
